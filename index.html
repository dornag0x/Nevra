<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nevra</title>
  <link rel="icon" type="image/png" href="logowebsite.png" />
  <meta name="description" content="On-chain credit scoring. Built on Solana." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: #0a0e13;
      color: #e1d9c7;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .logo {
      position: fixed;
      top: 28px;
      left: 36px;
      text-decoration: none;
      z-index: 10;
    }

    .logo img {
      height: 75px;
      width: auto;
      display: block;
    }

    .hero {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 0 24px;
    }

    .hero-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 0;
    }

    .label {
      font-family: "DM Mono", monospace;
      font-weight: 400;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #e1d9c7;
      opacity: 0.4;
      margin-bottom: 24px;
    }

    .headline {
      font-family: "Instrument Serif", Georgia, serif;
      font-size: clamp(3rem, 8vw, 7rem);
      font-weight: 400;
      line-height: 1.05;
      color: #e1d9c7;
      letter-spacing: -0.01em;
      margin-bottom: 20px;
    }

    .subheadline {
      font-family: "DM Mono", monospace;
      font-weight: 300;
      font-size: clamp(0.75rem, 1.5vw, 0.95rem);
      color: #e1d9c7;
      opacity: 0.5;
      letter-spacing: 0.02em;
      margin-bottom: 40px;
    }

    .waitlist-form {
      display: flex;
      align-items: center;
      gap: 0;
      justify-content: center;
    }

    .input-email {
      font-family: "DM Mono", monospace;
      font-size: 12px;
      font-weight: 300;
      letter-spacing: 0.05em;
      color: #e1d9c7;
      background: transparent;
      border: 1px solid rgba(225, 217, 199, 0.3);
      border-right: none;
      padding: 14px 20px;
      border-radius: 2px 0 0 2px;
      outline: none;
      width: 240px;
      transition: border-color 0.2s ease;
    }

    .input-email::placeholder {
      color: #e1d9c7;
      opacity: 0.3;
    }

    .input-email:focus {
      border-color: rgba(225, 217, 199, 0.6);
    }

    .btn-waitlist {
      display: inline-block;
      font-family: "DM Mono", monospace;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      color: #e1d9c7;
      border: 1px solid rgba(225, 217, 199, 0.3);
      padding: 14px 36px;
      border-radius: 0 2px 2px 0;
      background: transparent;
      cursor: pointer;
      transition: border-color 0.2s ease, background 0.2s ease;
      white-space: nowrap;
    }

    .btn-waitlist:hover {
      border-color: rgba(225, 217, 199, 0.8);
      background: rgba(225, 217, 199, 0.04);
    }

    /* Modal overlay */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10, 14, 19, 0.7);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.visible {
      display: flex;
    }

    .modal {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 16px;
      padding: 56px 64px;
      border: 1px solid rgba(225, 217, 199, 0.12);
      background: rgba(10, 14, 19, 0.6);
      border-radius: 4px;
      max-width: 420px;
      width: calc(100% - 48px);
      animation: modal-in 0.35s ease;
    }

    @keyframes modal-in {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .modal-label {
      font-family: "DM Mono", monospace;
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #e1d9c7;
      opacity: 0.35;
    }

    .modal-title {
      font-family: "Instrument Serif", Georgia, serif;
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 400;
      color: #e1d9c7;
      line-height: 1.15;
    }

    .modal-sub {
      font-family: "DM Mono", monospace;
      font-size: 12px;
      font-weight: 300;
      color: #e1d9c7;
      opacity: 0.4;
      letter-spacing: 0.04em;
    }

    .modal-close {
      margin-top: 8px;
      font-family: "DM Mono", monospace;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #e1d9c7;
      opacity: 0.35;
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px 0;
      transition: opacity 0.2s ease;
    }

    .modal-close:hover {
      opacity: 0.7;
    }

    .social-links {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 16px;
      z-index: 10;
    }

    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border: 1px solid rgba(225, 217, 199, 0.2);
      border-radius: 2px;
      color: #e1d9c7;
      opacity: 0.4;
      text-decoration: none;
      transition: opacity 0.2s ease, border-color 0.2s ease;
    }

    .social-btn:hover {
      opacity: 0.85;
      border-color: rgba(225, 217, 199, 0.5);
    }

    .social-btn svg {
      width: 15px;
      height: 15px;
      fill: currentColor;
    }

    @media (max-width: 560px) {
      .logo {
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
      }

      .logo img {
        height: 48px;
      }

      .hero {
        padding: 100px 20px 40px;
        align-items: center;
      }

      .waitlist-form {
        flex-direction: column;
        width: 100%;
      }

      .input-email {
        border-right: 1px solid rgba(225, 217, 199, 0.3);
        border-bottom: none;
        border-radius: 2px 2px 0 0;
        width: 100%;
      }

      .btn-waitlist {
        border-radius: 0 0 2px 2px;
        width: 100%;
        text-align: center;
      }
    }
  </style>
</head>
<body>

  <a class="logo" href="#"><img src="logowebsite.png" alt="Nevra" /></a>

  <main class="hero">
    <div class="hero-inner">
      <p class="label">Private beta &middot; 2026</p>
      <h1 class="headline">The credit layer<br>the internet never had.</h1>
      <p class="subheadline">On-chain undercollateralized loan.</p>
      <div class="waitlist-form" id="waitlist-form">
        <input class="input-email" type="email" placeholder="your@email.com" id="email-input" />
        <button class="btn-waitlist" type="button" id="submit-btn" onclick="submitWaitlist()">
          Join the waitlist
        </button>
      </div>
    </div>
  </main>

  <div class="social-links">
    <a class="social-btn" href="https://x.com/nevralabs" target="_blank" rel="noopener noreferrer" aria-label="X">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.253 5.622 5.911-5.622Zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
      </svg>
    </a>
    <a class="social-btn" href="https://t.me/nevragenesis" target="_blank" rel="noopener noreferrer" aria-label="Telegram">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/>
      </svg>
    </a>
  </div>

  <!-- Success modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <p class="modal-label">Confirmed</p>
      <h2 class="modal-title">You're on the list.</h2>
      <p class="modal-sub">We'll reach out when access opens.</p>
      <button class="modal-close" onclick="closeModal()">Dismiss</button>
    </div>
  </div>

  <!-- Already registered modal -->
  <div class="modal-overlay" id="modal-duplicate">
    <div class="modal">
      <p class="modal-label">Already registered</p>
      <h2 class="modal-title">You're already in.</h2>
      <p class="modal-sub">This address is already on the waitlist.</p>
      <button class="modal-close" onclick="closeDuplicate()">Dismiss</button>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://ssrbrvanjgikskdlledx.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNzcmJydmFuamdpa3NrZGxsZWR4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNjQ4NTEsImV4cCI6MjA5MDk0MDg1MX0.tgrgUAU6gCn7zaeDb9mlG0VVMzp80GjV8rQZ8aA3Ue0';

    async function submitWaitlist() {
      const email = document.getElementById('email-input').value.trim();
      const btn = document.getElementById('submit-btn');

      if (!email || !email.includes('@')) return;

      btn.textContent = '...';
      btn.disabled = true;

      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/Waitlist`, {
          method: 'POST',
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`,
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal'
          },
          body: JSON.stringify({ email })
        });

        if (res.ok) {
          document.getElementById('modal-overlay').classList.add('visible');
        } else if (res.status === 409) {
          btn.textContent = 'Join the waitlist';
          btn.disabled = false;
          document.getElementById('modal-duplicate').classList.add('visible');
        } else {
          const body = await res.text();
          console.error('[waitlist] HTTP', res.status, body);
          throw new Error(res.status);
        }
      } catch (err) {
        console.error('[waitlist] error:', err);
        btn.textContent = 'Join the waitlist';
        btn.disabled = false;
      }
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('visible');
    }

    function closeDuplicate() {
      document.getElementById('modal-duplicate').classList.remove('visible');
    }

    document.getElementById('modal-overlay').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    document.getElementById('modal-duplicate').addEventListener('click', function(e) {
      if (e.target === this) closeDuplicate();
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') { closeModal(); closeDuplicate(); }
    });

    document.getElementById('email-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') submitWaitlist();
    });
  </script>

</body>
</html>
